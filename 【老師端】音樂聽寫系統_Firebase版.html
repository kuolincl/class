<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>音樂聽寫系統｜老師端</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700;900&family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet">

<!-- ★★★ 第一步：把下面的 Firebase 設定換成你自己的 ★★★ -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, get, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  // ▼▼▼ 換成你的 Firebase 設定 ▼▼▼
 cconst firebaseConfig = {
  apiKey: "AIzaSyCWWcAaz5oQGthHrwr5YgIcAFsepCPROCw",
  authDomain: "music-b1097.firebaseapp.com",
  databaseURL: "https://music-b1097-default-rtdb.firebaseio.com",
  projectId: "music-b1097",
  storageBucket: "music-b1097.firebasestorage.app",
  messagingSenderId: "772363689744",
  appId: "1:772363689744:web:011618addceee3dfa98f95",
  measurementId: "G-19SBWT0MGK"
};
  // ▲▲▲ 換成你的 Firebase 設定 ▲▲▲

  try {
    const app = initializeApp(firebaseConfig);
    const db  = getDatabase(app);
    window._db      = db;
    window._ref     = ref;
    window._set     = set;
    window._get     = get;
    window._onValue = onValue;
    window._update  = update;
    // 解鎖建立按鈕
    document.addEventListener('DOMContentLoaded', () => {
      const btn = document.getElementById('create-btn');
      if (btn) { btn.disabled = false; btn.textContent = '🚀 建立測驗房間'; }
      if (firebaseConfig.apiKey === 'YOUR_API_KEY') {
        document.getElementById('cfg-warn').classList.add('show');
      }
    });
  } catch(e) {
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('cfg-warn').classList.add('show');
    });
  }
</script>

<style>
:root{
  --ink:#1a1108;--cream:#f7f2e6;--gold:#c9942a;--goldl:#e8c46a;
  --burgundy:#7b1f3e;--navy:#1a3c6e;--purple:#4a1a7e;
  --ok:#2d6a4f;--bg:#12100a;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);font-family:'Noto Serif TC',serif;color:var(--cream);min-height:100vh;}

.header{background:linear-gradient(135deg,#1a0d08,#2a1408);border-bottom:2px solid var(--gold);padding:16px 24px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:200;}
.hbadge{background:linear-gradient(135deg,var(--burgundy),#5a1530);color:var(--goldl);font-family:'Source Code Pro',monospace;font-size:10px;letter-spacing:3px;padding:5px 14px;border-radius:2px;border:1px solid rgba(201,148,42,.3);}
.header h1{font-family:'Playfair Display',serif;font-size:20px;font-weight:900;}
.header h1 em{color:var(--goldl);font-style:italic;}
.hcode{margin-left:auto;font-family:'Source Code Pro',monospace;font-size:15px;color:var(--goldl);background:rgba(201,148,42,.1);border:1px solid rgba(201,148,42,.3);padding:6px 16px;border-radius:3px;letter-spacing:3px;display:none;}
.hcode.show{display:block;}
.ldot{width:9px;height:9px;background:#4caf50;border-radius:50%;box-shadow:0 0 0 0 rgba(76,175,80,.4);animation:pulse 1.5s infinite;display:none;}
.ldot.show{display:block;}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(76,175,80,.4);}70%{box-shadow:0 0 0 9px transparent;}100%{box-shadow:0 0 0 0 transparent;}}

.layout{display:grid;grid-template-columns:290px 1fr;min-height:calc(100vh - 60px);}
.sidebar{background:rgba(247,242,230,.03);border-right:1px solid rgba(201,148,42,.13);padding:18px 14px;overflow-y:auto;}
.content{padding:20px 22px;overflow-y:auto;}

.card{background:rgba(247,242,230,.05);border:1px solid rgba(201,148,42,.13);border-radius:6px;margin-bottom:14px;overflow:hidden;}
.ch{padding:11px 15px;border-bottom:1px solid rgba(201,148,42,.08);}
.ch.gold{background:linear-gradient(135deg,rgba(201,148,42,.14),rgba(201,148,42,.04));}
.ch.red{background:linear-gradient(135deg,rgba(123,31,62,.28),rgba(123,31,62,.08));}
.ch.blue{background:linear-gradient(135deg,rgba(26,60,110,.28),rgba(26,60,110,.08));}
.ch h3{font-family:'Playfair Display',serif;font-size:14px;color:var(--goldl);}
.cb{padding:13px 15px;}

.btn{padding:8px 16px;border:none;border-radius:3px;cursor:pointer;font-family:'Noto Serif TC',serif;font-size:13px;font-weight:700;letter-spacing:1px;transition:all .2s;display:inline-flex;align-items:center;gap:5px;}
.btn-gold{background:linear-gradient(135deg,var(--gold),#8a6018);color:var(--ink);}
.btn-red{background:linear-gradient(135deg,var(--burgundy),#5a1530);color:var(--cream);}
.btn-blue{background:linear-gradient(135deg,var(--navy),#0f2444);color:var(--cream);}
.btn-green{background:linear-gradient(135deg,#2d6a4f,#1a3d2e);color:var(--cream);}
.btn-ghost{background:transparent;color:var(--goldl);border:1px solid rgba(201,148,42,.3);}
.btn:hover{filter:brightness(1.2);transform:translateY(-1px);}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none!important;filter:none!important;}
.btn-sm{padding:5px 11px;font-size:12px;}
.btn-block{width:100%;justify-content:center;margin-bottom:8px;}

.fg{margin-bottom:11px;}
.fl{font-size:11px;color:rgba(247,242,230,.45);letter-spacing:2px;margin-bottom:4px;display:block;}
.fi{width:100%;padding:8px 11px;background:rgba(247,242,230,.07);border:1px solid rgba(247,242,230,.14);border-radius:3px;color:var(--cream);font-family:'Noto Serif TC',serif;font-size:13px;}
.fi:focus{outline:none;border-color:var(--gold);}
select.fi option{background:#1a1408;color:var(--cream);}

.qtabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;}
.qtab{padding:5px 12px;border:1px solid rgba(247,242,230,.14);border-radius:20px;background:transparent;color:rgba(247,242,230,.4);font-family:'Noto Serif TC',serif;font-size:12px;cursor:pointer;transition:all .2s;}
.qtab.active{background:var(--gold);color:var(--ink);border-color:var(--gold);font-weight:700;}

.code-big{text-align:center;padding:22px;background:linear-gradient(135deg,rgba(201,148,42,.1),rgba(201,148,42,.03));border:2px solid rgba(201,148,42,.3);border-radius:6px;margin-bottom:14px;}
.code-big .lbl{font-size:10px;color:rgba(247,242,230,.4);letter-spacing:3px;margin-bottom:6px;}
.code-big .code{font-family:'Source Code Pro',monospace;font-size:52px;font-weight:600;color:var(--goldl);letter-spacing:10px;}
.code-big .hint{font-size:11px;color:rgba(247,242,230,.3);margin-top:6px;}

.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.sbox{background:rgba(247,242,230,.05);border:1px solid rgba(247,242,230,.09);border-radius:5px;padding:11px;text-align:center;}
.sval{font-family:'Source Code Pro',monospace;font-size:22px;font-weight:700;color:var(--goldl);}
.slbl{font-size:10px;color:rgba(247,242,230,.4);letter-spacing:1px;margin-top:2px;}

.ptabs{display:flex;border-bottom:1px solid rgba(201,148,42,.13);margin-bottom:14px;}
.ptab{padding:9px 16px;border:none;background:transparent;color:rgba(247,242,230,.38);font-family:'Noto Serif TC',serif;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s;}
.ptab.active{color:var(--goldl);border-bottom-color:var(--gold);}

.slist{display:flex;flex-direction:column;gap:5px;max-height:380px;overflow-y:auto;}
.srow{display:grid;grid-template-columns:32px 1fr 52px 52px;gap:6px;align-items:center;background:rgba(247,242,230,.03);border:1px solid rgba(247,242,230,.07);border-radius:4px;padding:7px 9px;transition:all .3s;}
.srow.done{border-color:rgba(45,106,79,.35);background:rgba(45,106,79,.07);}
.snum{font-family:'Source Code Pro',monospace;font-size:10px;color:rgba(247,242,230,.35);}
.sname{font-size:12px;font-weight:600;}
.sscore{font-family:'Source Code Pro',monospace;font-size:12px;font-weight:700;color:var(--goldl);}
.stime{font-family:'Source Code Pro',monospace;font-size:10px;color:rgba(247,242,230,.35);}

.rtbl{width:100%;border-collapse:collapse;font-size:13px;}
.rtbl th{background:rgba(201,148,42,.11);padding:7px 9px;text-align:left;font-size:10px;letter-spacing:2px;color:var(--goldl);border-bottom:1px solid rgba(201,148,42,.18);}
.rtbl td{padding:7px 9px;border-bottom:1px solid rgba(247,242,230,.05);}
.rtbl tr:hover td{background:rgba(247,242,230,.03);}
.rbadge{display:inline-block;width:20px;height:20px;border-radius:50%;font-size:10px;font-weight:700;text-align:center;line-height:20px;}
.r1{background:var(--gold);color:var(--ink);}.r2{background:#888;color:#fff;}.r3{background:#8b4513;color:#fff;}.rn{background:rgba(247,242,230,.09);color:rgba(247,242,230,.4);}

.timer{font-family:'Source Code Pro',monospace;font-size:30px;color:var(--goldl);letter-spacing:3px;text-align:center;padding:8px 0;}
.mbars{display:flex;align-items:flex-end;gap:3px;height:56px;margin-top:6px;}
.mbar{flex:1;background:var(--navy);border-radius:2px 2px 0 0;min-height:2px;transition:height .5s;position:relative;}
.mbar .bv{position:absolute;top:-15px;left:50%;transform:translateX(-50%);font-size:9px;color:var(--goldl);white-space:nowrap;}
.mbar .bl{position:absolute;bottom:-15px;left:50%;transform:translateX(-50%);font-size:9px;color:rgba(247,242,230,.35);white-space:nowrap;}

.toast{position:fixed;bottom:22px;right:22px;background:var(--ok);color:#fff;padding:9px 18px;border-radius:4px;font-size:13px;font-weight:700;transform:translateY(50px);opacity:0;transition:all .3s;z-index:999;}
.toast.show{transform:translateY(0);opacity:1;}

/* config not set warning */
.cfg-warn{background:rgba(155,34,38,.15);border:1px solid rgba(155,34,38,.4);border-radius:5px;padding:12px 16px;margin-bottom:14px;font-size:13px;color:#ffaaaa;display:none;}
.cfg-warn.show{display:block;}

@media(max-width:680px){.layout{grid-template-columns:1fr;}.sidebar{border-right:none;border-bottom:1px solid rgba(201,148,42,.13);}}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-thumb{background:rgba(201,148,42,.25);border-radius:2px;}
</style>
</head>
<body>

<div class="header">
  <div class="hbadge">TEACHER</div>
  <h1>音樂聽寫<em>老師端</em></h1>
  <div class="ldot" id="ldot"></div>
  <div class="hcode" id="hcode"></div>
</div>

<div class="layout">
<div class="sidebar">

  <div class="cfg-warn" id="cfg-warn">
    ⚠️ 尚未設定 Firebase！請先完成設定教學，將 firebaseConfig 換成你的資料。
  </div>

  <div id="setup-panel">
    <div class="card">
      <div class="ch gold"><h3>🎯 建立測驗</h3></div>
      <div class="cb">
        <div class="fg"><label class="fl">班級名稱</label><input class="fi" id="cn" type="text" value="高一音樂班"></div>
        <div class="fg">
          <label class="fl">包含類型</label>
          <div class="qtabs" id="qtabs">
            <button class="qtab active" data-t="rhythm">♩ 節奏</button>
            <button class="qtab active" data-t="melody">🎵 旋律</button>
            <button class="qtab active" data-t="chord">🎹 和弦</button>
          </div>
        </div>
        <div class="fg"><label class="fl">每類型題數</label>
          <select class="fi" id="qc">
            <option value="3">各3題</option>
            <option value="5" selected>各5題</option>
            <option value="8">各8題</option>
          </select>
        </div>
        <button class="btn btn-gold btn-block" id="create-btn" onclick="createRoom()" disabled>⏳ 連線中…</button>
      </div>
    </div>

    <div id="room-panel" style="display:none">
      <div class="code-big">
        <div class="lbl">學生輸入此代碼</div>
        <div class="code" id="code-big">——</div>
        <div class="hint">開啟學生端頁面輸入代碼即可加入</div>
      </div>
      <button class="btn btn-green btn-block" id="startbtn" onclick="startQuiz()" disabled>▶ 開始測驗</button>
      <button class="btn btn-ghost btn-block btn-sm" onclick="endQuiz()">⏹ 結束測驗</button>
    </div>
  </div>

  <div class="card" id="sc" style="display:none">
    <div class="ch blue"><h3>👥 學生動態</h3><span style="margin-left:auto;font-family:'Source Code Pro',monospace;font-size:10px;color:rgba(247,242,230,.35);" id="scnt">0人</span></div>
    <div class="cb" style="padding:7px">
      <div class="slist" id="slist"><div style="text-align:center;color:rgba(247,242,230,.25);font-size:12px;padding:14px">等待學生加入…</div></div>
    </div>
  </div>

</div>

<div class="content">
  <div id="welcome">
    <div style="text-align:center;padding:70px 20px">
      <div style="font-size:60px;margin-bottom:14px">🎵</div>
      <div style="font-family:'Playfair Display',serif;font-size:26px;color:var(--goldl);margin-bottom:8px">音樂聽寫教室系統</div>
      <div style="color:rgba(247,242,230,.35);font-size:13px;letter-spacing:1px">請在左側建立測驗房間，學生掃 QR Code 或輸入代碼即可加入</div>
    </div>
  </div>

  <div id="qstate" style="display:none">
    <div class="ptabs">
      <button class="ptab active" onclick="showTab('live',this)">📡 即時狀況</button>
      <button class="ptab" onclick="showTab('results',this)">📊 成績總覽</button>
    </div>

    <div id="tab-live">
      <div class="stats">
        <div class="sbox"><div class="sval" id="st-j">0</div><div class="slbl">已加入</div></div>
        <div class="sbox"><div class="sval" id="st-d">0</div><div class="slbl">已完成</div></div>
        <div class="sbox"><div class="sval" id="st-a">—</div><div class="slbl">平均分</div></div>
      </div>
      <div class="card"><div class="ch blue"><h3>⏱ 計時</h3></div><div class="cb"><div class="timer" id="qtimer">00:00</div></div></div>
      <div class="card" id="distcard" style="display:none">
        <div class="ch gold"><h3>📈 分數分佈</h3></div>
        <div class="cb"><div class="mbars" id="mbars"></div><div style="margin-top:18px"></div></div>
      </div>
    </div>

    <div id="tab-results" style="display:none">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div style="font-family:'Playfair Display',serif;font-size:17px;color:var(--goldl)">成績總覽</div>
        <div style="display:flex;gap:7px">
          <button class="btn btn-sm btn-ghost" onclick="exportCSV()">⬇ 匯出CSV</button>
          <button class="btn btn-sm btn-gold" onclick="loadResults()">↺ 更新</button>
        </div>
      </div>
      <table class="rtbl">
        <thead><tr><th>排名</th><th>座號</th><th>姓名</th><th>節奏</th><th>旋律</th><th>和弦</th><th>總分</th><th>用時</th></tr></thead>
        <tbody id="rtbody"><tr><td colspan="8" style="text-align:center;color:rgba(247,242,230,.25);padding:22px">等待學生作答…</td></tr></tbody>
      </table>
    </div>
  </div>
</div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── 所有函數掛到 window，讓 onclick 可以呼叫（因 Firebase 用 type="module"）──

const TYPES = new Set(['rhythm','melody','chord']);
document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('.qtab').forEach(b => b.addEventListener('click', () => {
    const t = b.dataset.t;
    if (TYPES.has(t)) { TYPES.delete(t); b.classList.remove('active'); }
    else { TYPES.add(t); b.classList.add('active'); }
  }));
});

let roomCode = null, unsubscribe = null;
let qtimerInt = null, qsecs = 0;
let className = '';

function _toast(msg, c = '#2d6a4f') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.style.background = c;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2800);
}

function _fmt(s) {
  return String(Math.floor(s / 60)).padStart(2, '0') + ':' + String(Math.floor(s % 60)).padStart(2, '0');
}

// ── 建立房間 ──
window.createRoom = async function () {
  if (!window._db) { alert('Firebase 尚未連線！請確認 firebaseConfig 設定。'); return; }
  const btn = document.getElementById('create-btn');
  btn.disabled = true; btn.textContent = '建立中…';

  roomCode = String(Math.floor(1000 + Math.random() * 9000));
  className = document.getElementById('cn').value || '音樂班';
  const qc = parseInt(document.getElementById('qc').value);
  const types = [...TYPES];
  const room = { code: roomCode, className, types, qCount: qc, status: 'waiting', createdAt: Date.now(), students: {} };

  try {
    await window._set(window._ref(window._db, 'rooms/' + roomCode), room);

    // 顯示房間代碼（大字）
    document.getElementById('code-big').textContent = roomCode;
    // 顯示 header 上的小代碼
    document.getElementById('hcode').textContent = '房間 ' + roomCode;
    document.getElementById('hcode').classList.add('show');
    // 顯示房間面板
    document.getElementById('room-panel').style.display = 'block';
    document.getElementById('startbtn').disabled = false;
    document.getElementById('sc').style.display = 'block';
    document.getElementById('welcome').style.display = 'none';

    btn.disabled = false; btn.textContent = '🔄 重新建立';
    _toast('✅ 房間 ' + roomCode + ' 已建立！');
    _listenRoom();
  } catch (e) {
    btn.disabled = false; btn.textContent = '🚀 建立測驗房間';
    alert('建立失敗：' + e.message);
  }
};

function _listenRoom() {
  if (unsubscribe) unsubscribe();
  const r = window._ref(window._db, 'rooms/' + roomCode + '/students');
  unsubscribe = window._onValue(r, snap => {
    const students = snap.val() || {};
    _renderStudents(students);
    _updateStats(students);
  });
}

function _renderStudents(students) {
  const arr = Object.values(students).sort((a, b) => a.seatNo - b.seatNo);
  document.getElementById('scnt').textContent = arr.length + '人';
  document.getElementById('st-j').textContent = arr.length;
  const el = document.getElementById('slist');
  if (!arr.length) {
    el.innerHTML = '<div style="text-align:center;color:rgba(247,242,230,.25);font-size:12px;padding:14px">等待學生加入…</div>';
    return;
  }
  el.innerHTML = arr.map(s => {
    const done = s.status === 'done';
    const elapsed = done && s.finishedAt && s.startedAt
      ? _fmt((s.finishedAt - s.startedAt) / 1000)
      : (s.startedAt ? '作答中' : '等待中');
    return `<div class="srow ${done ? 'done' : ''}">
      <div class="snum">${String(s.seatNo).padStart(2, '0')}</div>
      <div class="sname">${s.name}</div>
      <div class="sscore">${done ? (s.totalScore + '分') : '—'}</div>
      <div class="stime">${elapsed}</div>
    </div>`;
  }).join('');
}

function _updateStats(students) {
  const arr = Object.values(students);
  const done = arr.filter(s => s.status === 'done');
  document.getElementById('st-d').textContent = done.length;
  if (done.length) {
    const avg = done.reduce((a, s) => a + (s.totalScore || 0), 0) / done.length;
    document.getElementById('st-a').textContent = avg.toFixed(1);
    _renderBars(done);
  }
}

function _renderBars(done) {
  document.getElementById('distcard').style.display = 'block';
  const buckets = Array(10).fill(0);
  done.forEach(s => { const b = Math.min(9, Math.floor(((s.totalScore || 0) / 100) * 10)); buckets[b]++; });
  const mx = Math.max(...buckets, 1);
  const labels = ['0-9','10-19','20-29','30-39','40-49','50-59','60-69','70-79','80-89','90+'];
  document.getElementById('mbars').innerHTML = buckets.map((v, i) =>
    `<div class="mbar" style="height:${Math.max(2, (v / mx) * 52)}px">
      <span class="bv">${v || ''}</span><span class="bl">${labels[i]}</span>
    </div>`
  ).join('');
}

// ── 開始測驗 ──
window.startQuiz = async function () {
  if (!roomCode || !window._db) return;
  await window._update(window._ref(window._db, 'rooms/' + roomCode), { status: 'active', startedAt: Date.now() });
  document.getElementById('qstate').style.display = 'block';
  document.getElementById('ldot').classList.add('show');
  document.getElementById('startbtn').disabled = true;
  qsecs = 0;
  qtimerInt = setInterval(() => {
    qsecs++;
    document.getElementById('qtimer').textContent = _fmt(qsecs);
  }, 1000);
  _toast('▶ 測驗開始！');
};

// ── 結束測驗 ──
window.endQuiz = async function () {
  if (!confirm('確定結束測驗？')) return;
  clearInterval(qtimerInt);
  if (roomCode && window._db) {
    await window._update(window._ref(window._db, 'rooms/' + roomCode), { status: 'ended', endedAt: Date.now() });
  }
  document.getElementById('ldot').classList.remove('show');
  _toast('⏹ 測驗已結束');
  window.loadResults();
  // 切換到成績分頁
  const resultTab = document.querySelectorAll('.ptab')[1];
  window.showTab('results', resultTab);
};

// ── 載入成績 ──
window.loadResults = async function () {
  if (!roomCode || !window._db) return;
  const snap = await window._get(window._ref(window._db, 'rooms/' + roomCode + '/students'));
  const students = Object.values(snap.val() || {}).filter(s => s.status === 'done');
  students.sort((a, b) => (b.totalScore || 0) - (a.totalScore || 0));
  const tbody = document.getElementById('rtbody');
  if (!students.length) {
    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:rgba(247,242,230,.25);padding:22px">等待學生作答…</td></tr>';
    return;
  }
  tbody.innerHTML = students.map((s, i) => {
    const rc = i < 3 ? 'r' + (i + 1) : 'rn';
    const el = s.finishedAt && s.startedAt ? _fmt((s.finishedAt - s.startedAt) / 1000) : '—';
    return `<tr>
      <td><span class="rbadge ${rc}">${i + 1}</span></td>
      <td style="font-family:'Source Code Pro',monospace">${String(s.seatNo).padStart(2, '0')}</td>
      <td style="font-weight:600">${s.name}</td>
      <td style="color:var(--goldl)">${s.rhythmScore ?? '—'}</td>
      <td style="color:var(--goldl)">${s.melodyScore ?? '—'}</td>
      <td style="color:var(--goldl)">${s.chordScore ?? '—'}</td>
      <td style="font-family:'Source Code Pro',monospace;font-size:15px;font-weight:700;color:var(--goldl)">${s.totalScore ?? '—'}</td>
      <td style="font-family:'Source Code Pro',monospace;font-size:11px;color:rgba(247,242,230,.4)">${el}</td>
    </tr>`;
  }).join('');
};

// ── 匯出 CSV ──
window.exportCSV = async function () {
  if (!roomCode || !window._db) return;
  const snap = await window._get(window._ref(window._db, 'rooms/' + roomCode + '/students'));
  const students = Object.values(snap.val() || {}).filter(s => s.status === 'done');
  students.sort((a, b) => (b.totalScore || 0) - (a.totalScore || 0));
  let csv = '\uFEFF座號,姓名,節奏,旋律,和弦,總分,用時\n';
  students.forEach(s => {
    const el = s.finishedAt && s.startedAt ? _fmt((s.finishedAt - s.startedAt) / 1000) : '';
    csv += `${s.seatNo},${s.name},${s.rhythmScore ?? ''},${s.melodyScore ?? ''},${s.chordScore ?? ''},${s.totalScore ?? ''},${el}\n`;
  });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8' }));
  a.download = `聽寫成績_${className}_${roomCode}.csv`;
  a.click();
};

// ── 切換分頁 ──
window.showTab = function (name, btn) {
  document.querySelectorAll('.ptab').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  document.getElementById('tab-live').style.display = name === 'live' ? 'block' : 'none';
  document.getElementById('tab-results').style.display = name === 'results' ? 'block' : 'none';
  if (name === 'results') window.loadResults();
};
</script>
</body>
</html>
